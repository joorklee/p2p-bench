healthCheckTimeout: 1200
logLevel: info
models:
  p2p_on-c1:
    cmd: bash -c 'vllm serve /data/models/qwen3.6-27b-text-nvfp4-mtp --served-model-name p2p_on-c1 --port 8103 --max-num-seqs 1 --quantization modelopt --tensor-parallel-size 2 --max-model-len 150000 --kv-cache-dtype fp8 --max-num-batched-tokens 16384 --gpu-memory-utilization 0.88 --speculative-config '"'"'{"method":"mtp","num_speculative_tokens":3}'"'"' --reasoning-parser qwen3 --tool-call-parser qwen3_coder --attention-backend TRITON_ATTN --language-model-only --enable-auto-tool-choice --disable-custom-all-reduce 2>&1 | tee /mnt/user-data/outputs/p2p-bench/examples/logs/p2p_on-c1.log'
    proxy: http://127.0.0.1:8103
    env:
    - CUDA_DEVICE_ORDER=PCI_BUS_ID
    - CUDA_VISIBLE_DEVICES=1,2
    - NCCL_CUMEM_ENABLE=1
    - NCCL_DEBUG=INFO
    - VLLM_LOGGING_LEVEL=INFO
