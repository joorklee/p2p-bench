# SINGLE-CARD NVFP4 BASELINE — the roofline anchor and the practical comparison a
# buyer actually faces: 1x 5060 Ti running NVFP4 (4-bit, native Blackwell FP4,
# ~3.5 GB weights -> fits one 16GB card) vs the 4-card FP8 rig. No P2P/NCCL (one
# GPU). Gives: (a) a single-stream decode-roofline anchor, (b) 4x-FP8 vs 1x-NVFP4
# throughput AND $/perf, (c) one half of the FP8-vs-NVFP4 quant comparison.
model:
  path: /data/models/qwen3.6-27b-text-nvfp4-mtp
  port: 8103
  constant_args:
    quantization: modelopt
    tensor-parallel-size: 1
    max-model-len: 262144
    kv-cache-dtype: fp8
    gpu-memory-utilization: 0.90
    speculative-config: '{"method":"qwen3_next_mtp","num_speculative_tokens":3}'
    reasoning-parser: qwen3
    tool-call-parser: qwen3_coder
    attention-backend: flashinfer
  constant_flags: [trust-remote-code, language-model-only, enable-auto-tool-choice, async-scheduling]
  constant_env:
    CUDA_DEVICE_ORDER: PCI_BUS_ID
    CUDA_VISIBLE_DEVICES: "0"
    PYTORCH_ALLOC_CONF: expandable_segments:True
    VLLM_LOGGING_LEVEL: "INFO"
arms:
  single_nvfp4: { env: {} }
concurrencies: [1, 2, 3, 4]
roofline:
  mem_bw_GBps: 448
  weight_GB_per_gpu: 3.5      # NVFP4 ~13.5GB / 1 GPU... (verify: ~3.5 if 4-bit packed on this card's shard)
  kv_GB_per_token_per_gpu: 0.000064
  tp: 1
benchmark:
  dataset: random
  random_input_len: 4096
  random_output_len: 2048
  random_range_ratio: 0.0
  endpoint: /v1/completions
  backend: vllm
  num_prompts_multiplier: 16
  num_warmups: 8
  seed: 1234
  ignore_eos: true
  percentile_metrics: ttft,tpot,itl,e2el
  metric_percentiles: "50,90,99"
  reps: 10
  interleave_reps: true
  cooldown_seconds: 20
  vram_free_threshold_mb: 1024
  vram_free_timeout: 180
