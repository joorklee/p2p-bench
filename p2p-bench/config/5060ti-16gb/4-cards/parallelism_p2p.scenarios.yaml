# =============================================================================
# P2P benchmark scenario matrix — 4-CARD: parallelism x P2P
#
# QUESTION: on a PCIe/OCuLink-bottlenecked 4x5060 Ti box, is tensor parallelism
# or pipeline parallelism faster, and does P2P help them differently?
#   - TP all-reduces activations EVERY layer (comm volume ~ tokens, P2P-heavy).
#   - PP sends activations only at stage boundaries (point-to-point, once per
#     microbatch) but bubbles at low concurrency (needs >= num_stages in flight).
# So this crosses parallelism {TP4, PP4, TP2-PP2} x P2P {on, off}. The P2P x
# parallelism interaction is the headline this design can prove.
#
# DESIGN: within each parallelism mode, exactly ONE var (NCCL_P2P_DISABLE) moves
# between its p2p_on/p2p_off pair. disable-custom-all-reduce is held in ALL arms
# (custom AR is a TP-only path with its own peer check; holding it off keeps NCCL
# the communicator so NCCL_P2P_DISABLE actually controls transport).
#
# MTP is OFF here on purpose: (a) speculative decode + pipeline parallelism is
# not reliably supported together in vLLM, so leaving it on would confound PP vs
# TP with a spec-decode availability difference; (b) isolates the parallelism
# effect. Measure MTP separately (mtp_p2p.scenarios.yaml).
#
# NOTE: requires the extra_args fix in scenarios.py (per-arm server args).
# =============================================================================
model:
  path: /data/models/Qwen/Qwen3.6-27B-FP8
  port: 8103
  constant_args:
    max-model-len: 262144          # pinned to the deployed 256K window
    kv-cache-dtype: bfloat16
    gpu-memory-utilization: 0.92
    reasoning-parser: qwen3
    tool-call-parser: qwen3_coder
    attention-backend: flashinfer
    compilation-config: '{"max_cudagraph_capture_size":16,"mode":"VLLM_COMPILE"}'
    # PP on a single node uses the mp executor; pin it so TP and PP arms differ
    # only in the parallel split, not in the executor backend.
    distributed-executor-backend: mp
    # tensor/pipeline-parallel-size are per-arm (extra_args) — NOT pinned here.
  constant_flags:
    - trust-remote-code
    - language-model-only
    - enable-auto-tool-choice
    - async-scheduling
    - disable-custom-all-reduce
  constant_env:
    CUDA_DEVICE_ORDER: PCI_BUS_ID
    CUDA_VISIBLE_DEVICES: "0,1,2,3"
    NCCL_CUMEM_ENABLE: "1"
    VLLM_WORKER_MULTIPROC_METHOD: spawn
    PYTORCH_ALLOC_CONF: expandable_segments:True
    NCCL_DEBUG: "INFO"
    VLLM_LOGGING_LEVEL: "INFO"
    # NCCL_P2P_DISABLE is the per-arm variable.

arms:
  tp4_p2p_on:
    env: { NCCL_P2P_DISABLE: "0" }
    extra_args: { tensor-parallel-size: 4, pipeline-parallel-size: 1 }
  tp4_p2p_off:
    env: { NCCL_P2P_DISABLE: "1" }
    extra_args: { tensor-parallel-size: 4, pipeline-parallel-size: 1 }
  pp4_p2p_on:
    env: { NCCL_P2P_DISABLE: "0" }
    extra_args: { tensor-parallel-size: 1, pipeline-parallel-size: 4 }
  pp4_p2p_off:
    env: { NCCL_P2P_DISABLE: "1" }
    extra_args: { tensor-parallel-size: 1, pipeline-parallel-size: 4 }
  tp2pp2_p2p_on:
    env: { NCCL_P2P_DISABLE: "0" }
    extra_args: { tensor-parallel-size: 2, pipeline-parallel-size: 2 }
  tp2pp2_p2p_off:
    env: { NCCL_P2P_DISABLE: "1" }
    extra_args: { tensor-parallel-size: 2, pipeline-parallel-size: 2 }

# PP is bubble-limited at c1 (1 microbatch, stages idle); read the TP-vs-PP
# verdict at the TOP of the concurrency range, and expect PP to close the gap
# as concurrency rises. Single-user envelope kept at 1..4 per the writeup.
concurrencies: [1, 2, 3, 4]

benchmark:
  dataset: random
  random_input_len: 1024
  random_output_len: 1024
  random_range_ratio: 0.0
  endpoint: /v1/completions
  backend: vllm
  num_prompts_multiplier: 16
  num_warmups: 8
  seed: 1234
  ignore_eos: true
  percentile_metrics: ttft,tpot,itl,e2el
  metric_percentiles: "50,90,99"
  reps: 5
  interleave_reps: true
  cooldown_seconds: 20
  vram_free_threshold_mb: 1024
  vram_free_timeout: 180
