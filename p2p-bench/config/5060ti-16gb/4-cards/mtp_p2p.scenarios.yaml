# =============================================================================
# P2P benchmark scenario matrix — 4-CARD: MTP on/off (x P2P optional)
#
# QUESTION: what does MTP speculative decode actually buy at TP4, and does the
# P2P delta depend on whether MTP is on? (MTP changes the compute/comm ratio:
# verifying a block of spec tokens is compute-heavy, which can shift how much
# the interconnect matters.)
#
# Core arms: mtp_on vs mtp_off, both at P2P on, TP4. The two P2P-off arms are
# OPTIONAL (run with --include-optional-arm) and give the MTP x P2P interaction.
#
# Single isolated variable per comparison: speculative-config (on -> the
# qwen3_next_mtp config; off -> "" which the harness omits entirely).
#
# CAVEAT (must go in the writeup): the random-token workload makes MTP draft
# ACCEPTANCE near zero, so these absolute tok/s UNDERSTATE MTP's real-world gain.
# For the true number, re-run on a realistic dataset (ShareGPT / spec_bench) and
# report mean accepted-tokens/step from the server log. That needs the dataset
# -path / chat-endpoint bench patch (see the options list) — random is a
# pessimistic floor, useful only for the P2P-delta-under-MTP question.
#
# NOTE: requires the extra_args fix in scenarios.py (per-arm server args).
# =============================================================================
model:
  path: /data/models/Qwen/Qwen3.6-27B-FP8
  port: 8103
  constant_args:
    tensor-parallel-size: 4
    max-model-len: 262144
    kv-cache-dtype: bfloat16
    gpu-memory-utilization: 0.92
    reasoning-parser: qwen3
    tool-call-parser: qwen3_coder
    attention-backend: flashinfer
    compilation-config: '{"max_cudagraph_capture_size":16,"mode":"VLLM_COMPILE"}'
    # speculative-config is per-arm (the variable) — NOT pinned here.
  constant_flags:
    - trust-remote-code
    - language-model-only
    - enable-auto-tool-choice
    - async-scheduling
    - disable-custom-all-reduce
  constant_env:
    CUDA_DEVICE_ORDER: PCI_BUS_ID
    CUDA_VISIBLE_DEVICES: "0,1,2,3"
    NCCL_CUMEM_ENABLE: "1"
    VLLM_WORKER_MULTIPROC_METHOD: spawn
    PYTORCH_ALLOC_CONF: expandable_segments:True
    NCCL_DEBUG: "INFO"
    VLLM_LOGGING_LEVEL: "INFO"

arms:
  mtp_on_p2p_on:
    env: { NCCL_P2P_DISABLE: "0" }
    extra_args:
      speculative-config: '{"method":"qwen3_next_mtp","num_speculative_tokens":3}'
  mtp_off_p2p_on:
    env: { NCCL_P2P_DISABLE: "0" }
    extra_args:
      speculative-config: ""        # empty => harness omits the arg => MTP off
  mtp_on_p2p_off:
    optional: true
    env: { NCCL_P2P_DISABLE: "1" }
    extra_args:
      speculative-config: '{"method":"qwen3_next_mtp","num_speculative_tokens":3}'
  mtp_off_p2p_off:
    optional: true
    env: { NCCL_P2P_DISABLE: "1" }
    extra_args:
      speculative-config: ""

concurrencies: [1, 2, 3, 4]

benchmark:
  dataset: random
  random_input_len: 1024
  random_output_len: 1024
  random_range_ratio: 0.0
  endpoint: /v1/completions
  backend: vllm
  num_prompts_multiplier: 16
  num_warmups: 8
  seed: 1234
  ignore_eos: true
  percentile_metrics: ttft,tpot,itl,e2el
  metric_percentiles: "50,90,99"
  reps: 5
  interleave_reps: true
  cooldown_seconds: 20
  vram_free_threshold_mb: 1024
  vram_free_timeout: 180
