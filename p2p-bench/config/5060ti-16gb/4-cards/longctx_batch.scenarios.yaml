# 4-CARD LONG-CONTEXT BATCH SWEEP — max-num-batched-tokens only matters when the
# prompt exceeds the chunk (chunked prefill). At 131072 input the four chunk
# sizes = 32 / 16 / 8 / 4 prefill chunks: bigger chunk -> lower TTFT but coarser
# decode interleave. P2P on, TP4, MTP on. (This is the ONLY place a batch-size
# sweep is meaningful — at 1K input it would measure nothing.)
model:
  path: /data/models/Qwen/Qwen3.6-27B-FP8
  port: 8103
  constant_args:
    tensor-parallel-size: 4
    max-model-len: 262144
    kv-cache-dtype: bfloat16
    gpu-memory-utilization: 0.92
    speculative-config: '{"method":"qwen3_next_mtp","num_speculative_tokens":3}'
    reasoning-parser: qwen3
    tool-call-parser: qwen3_coder
    attention-backend: flashinfer
    compilation-config: '{"max_cudagraph_capture_size":16,"mode":"VLLM_COMPILE"}'
  constant_flags: [trust-remote-code, language-model-only, enable-auto-tool-choice, async-scheduling, disable-custom-all-reduce]
  constant_env:
    CUDA_DEVICE_ORDER: PCI_BUS_ID
    CUDA_VISIBLE_DEVICES: "0,1,2,3"
    NCCL_CUMEM_ENABLE: "1"
    VLLM_WORKER_MULTIPROC_METHOD: spawn
    PYTORCH_ALLOC_CONF: expandable_segments:True
    NCCL_DEBUG: "INFO"
    VLLM_LOGGING_LEVEL: "INFO"
arms:
  bt4096:  { env: { NCCL_P2P_DISABLE: "0" }, extra_args: { max-num-batched-tokens: 4096 } }
  bt8192:  { env: { NCCL_P2P_DISABLE: "0" }, extra_args: { max-num-batched-tokens: 8192 } }
  bt16384: { env: { NCCL_P2P_DISABLE: "0" }, extra_args: { max-num-batched-tokens: 16384 } }
  bt32768: { env: { NCCL_P2P_DISABLE: "0" }, extra_args: { max-num-batched-tokens: 32768 } }
concurrencies: [1, 2, 4]
benchmark:
  dataset: random
  random_input_len: 131072
  random_output_len: 32
  random_range_ratio: 0.0
  endpoint: /v1/completions
  backend: vllm
  num_prompts_multiplier: 3
  num_warmups: 2
  seed: 1234
  ignore_eos: true
  percentile_metrics: ttft,tpot,itl,e2el
  metric_percentiles: "50,90,99"
  reps: 5
  interleave_reps: true
  cooldown_seconds: 20
  vram_free_threshold_mb: 1024
  vram_free_timeout: 180
